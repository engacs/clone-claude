<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iXali AI Admin</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/admin/assets/admin.css" />
    <script>
      // Detect Electron environment to adjust layout for macOS window controls
      if (navigator.userAgent.toLowerCase().indexOf(' electron/') > -1) {
        document.addEventListener('DOMContentLoaded', () => {
          document.body.classList.add('electron-app');
        });
      }
    </script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">iX</div>
          <div>
            <h1>iXali AI</h1>
            <p>Server Control</p>
          </div>
        </div>
        <button id="themeToggle" class="theme-toggle-btn" type="button">🌓 Toggle Theme</button>
        <nav id="sectionNav" class="section-nav" aria-label="Admin views"></nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h2 id="pageTitle">Providers</h2>
          </div>
        </header>

        <div id="adminViews" class="admin-views">
          <section id="view-providers" class="admin-view active" data-view="providers">
            <section class="provider-strip" aria-label="Provider status">
              <div class="strip-header">
                <h3>Providers</h3>
              </div>
              <div id="providerGrid" class="provider-grid"></div>
            </section>
            <div
              id="providersSections"
              class="form-sections"
              aria-label="Provider configuration"
            ></div>
          </section>

          <section id="view-model_config" class="admin-view" data-view="model_config" hidden>
            <div
              id="modelConfigSections"
              class="form-sections"
              aria-label="Model configuration"
            ></div>
          </section>

          <section id="view-messaging" class="admin-view" data-view="messaging" hidden>
            <div
              id="messagingSections"
              class="form-sections"
              aria-label="Messaging configuration"
            ></div>
          </section>

          <section id="view-console_logs" class="admin-view" data-view="console_logs" hidden>
            <div class="settings-section">
              <div class="section-heading">
                <div>
                  <h3>Console Logs</h3>
                  <p>Real-time application output and proxy request logs.</p>
                </div>
                <button id="refreshLogsButton" class="secondary-button" type="button">Refresh Logs</button>
              </div>
              <div class="field">
                <textarea id="consoleLogsTextarea" readonly style="font-family: monospace; font-size: 13px; line-height: 1.5; height: 420px; background: var(--input); color: var(--text); border: 1px solid var(--line); border-radius: 10px; padding: 16px; width: 100%; resize: none;"></textarea>
              </div>
            </div>
          </section>
        </div>
      </main>

      <footer class="action-bar">
        <div class="action-meta">
          <strong id="dirtyState">No changes</strong>
          <span id="configPath"></span>
        </div>
        <div id="messageArea" class="message-area"></div>
        <div class="action-buttons">
          <button id="validateButton" class="secondary-button" type="button">Validate</button>
          <button id="applyButton" class="primary-button" type="button" disabled>Apply</button>
        </div>
      </footer>
    </div>
    <script src="/admin/assets/admin.js"></script>
  </body>
</html>
